<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gait - Subject 01</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1e272e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: rgba(20, 25, 30, 0.9); padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #34495e; }
        h2 { margin: 0 0 10px 0; color: #0fbcf9; font-size: 22px; }
        input[type=range] { width: 100%; cursor: pointer; margin: 15px 0; }
        .stats { display: flex; justify-content: space-between; margin-top: 10px; }
        .stat { background: #2d3436; padding: 10px; border-radius: 8px; width: 30%; }
        .val { font-size: 18px; font-weight: bold; color: #0fbcf9; }
        .lbl { font-size: 11px; color: #bdc3c7; text-transform: uppercase; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: bold; color: #0fbcf9; }
    </style>
</head>
<body>

<div id="loading">Loading 3D Engine...</div>

<div id="ui-panel" style="display: none;">
    <h2 id="phase">Initial Contact</h2>
    <div style="font-size: 12px; color: #bdc3c7; text-align: left;">Cycle Progression: <span id="pct">0</span>%</div>
    <input type="range" id="slider" min="0" max="100" value="0">
    
    <div class="stats">
        <div class="stat"><div id="h" class="val">0°</div><div class="lbl">Hip</div></div>
        <div class="stat"><div id="k" class="val">0°</div><div class="lbl">Knee</div></div>
        <div class="stat"><div id="a" class="val">0°</div><div class="lbl">Ankle</div></div>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.128.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/OrbitControls.js';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('ui-panel').style.display = 'block';

    // 1. DATA
    const gaitData = [
        {h: 24.6, k: -3.9, a: -1.7, name: "Initial Contact"},
        {h: 20.2, k: -17.0, a: -0.8, name: "Loading Response"},
        {h: 0.3, k: -6.6, a: 6.8, name: "Mid-Stance"},
        {h: -11.9, k: -2.4, a: 10.2, name: "Terminal Stance"},
        {h: -16.6, k: -8.2, a: 9.8, name: "Pre-Swing"},
        {h: 4.9, k: -55.7, a: -10.2, name: "Initial Swing"},
        {h: 21.8, k: -47.0, a: 1.4, name: "Mid-Swing"},
        {h: 24.7, k: -2.4, a: -0.0, name: "Terminal Swing"}
    ];

    function interpolate(p) {
        const idx = (p / 100) * (gaitData.length - 1);
        const i = Math.floor(idx);
        const t = idx - i;
        const next = gaitData[i+1] || gaitData[0];
        const lerp = (v1, v2) => v1 + (v2 - v1) * t;
        return {
            h: lerp(gaitData[i].h, next.h),
            k: lerp(gaitData[i].k, next.k),
            a: lerp(gaitData[i].a, next.a),
            name: gaitData[i].name
        };
    }

    // 2. SCENE
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.0, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.5, 0);
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(2, 5, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(10, 20, 0x0fbcf9, 0x485460);
    scene.add(grid);

    // 3. SKELETON BUILDER
    const matR = new THREE.MeshStandardMaterial({ color: 0x0fbcf9 }); 
    const matL = new THREE.MeshStandardMaterial({ color: 0x7f8c8d }); 
    const matJoint = new THREE.MeshStandardMaterial({ color: 0xf1c40f });

    function createBone(len, mat) {
        const bone = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, len, 16), mat);
        bone.position.y = -len / 2;
        const group = new THREE.Group();
        group.add(new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), matJoint));
        group.add(bone);
        return group;
    }

    function createFoot(mat) {
        // FIX: The box geometry is now Length(X), Height(Y), Width(Z) so it points forward
        const foot = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.04, 0.08), mat);
        // FIX: Shifted the foot box forward along the X axis so the ankle joint sits at the back
        foot.position.set(0.06, -0.02, 0); 
        const group = new THREE.Group();
        group.add(foot);
        return group;
    }

    const fLen = 0.40, tLen = 0.43;

    const pelvis = new THREE.Group();
    pelvis.position.y = 0.95;
    scene.add(pelvis);

    const rHip = createBone(fLen, matR); rHip.position.z = 0.15; pelvis.add(rHip);
    const rKnee = createBone(tLen, matR); rKnee.position.y = -fLen; rHip.add(rKnee);
    const rAnkle = createFoot(matR); rAnkle.position.y = -tLen; rKnee.add(rAnkle);

    const lHip = createBone(fLen, matL); lHip.position.z = -0.15; pelvis.add(lHip);
    const lKnee = createBone(tLen, matL); lKnee.position.y = -fLen; lHip.add(lKnee);
    const lAnkle = createFoot(matL); lAnkle.position.y = -tLen; lKnee.add(lAnkle);

    // 4. ANIMATION
    const slider = document.getElementById('slider');
    
    function update() {
        const p = parseInt(slider.value);
        const r = interpolate(p);
        const l = interpolate((p + 50) % 100);

        const rad = Math.PI / 180;

        rHip.rotation.z = r.h * rad;
        rKnee.rotation.z = r.k * rad;
        // FIX: Removed the minus sign. Positive ankle angle = dorsiflexion (toes up)
        rAnkle.rotation.z = r.a * rad; 

        lHip.rotation.z = l.h * rad;
        lKnee.rotation.z = l.k * rad;
        lAnkle.rotation.z = l.a * rad;

        document.getElementById('pct').innerText = p;
        document.getElementById('phase').innerText = r.name;
        document.getElementById('h').innerText = Math.round(r.h) + "°";
        document.getElementById('k').innerText = Math.round(r.k) + "°";
        document.getElementById('a').innerText = Math.round(r.a) + "°";
    }

    slider.addEventListener('input', update);
    update(); 

    // 5. RENDER LOOP
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
