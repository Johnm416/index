<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gait Analysis Viewer</title>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#1e272e;
color:white;
overflow:hidden;
}

#canvas{
width:100vw;
height:100vh;
}

.panel{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:600px;
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:10px;
}

.header{
text-align:center;
font-size:20px;
margin-bottom:10px;
color:#0fbcf9;
}

input[type=range]{
width:100%;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.stat{
text-align:center;
}

.stat-val{
font-size:20px;
color:#0fbcf9;
}

#chartBox{
position:absolute;
top:20px;
right:20px;
width:420px;
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:10px;
}

#fileUpload{
position:absolute;
top:20px;
left:20px;
}

</style>
</head>

<body>

<input id="fileUpload" type="file">

<div id="canvas"></div>

<div id="chartBox">
<canvas id="chart"></canvas>
</div>

<div class="panel">

<div class="header" id="phase">Initial Contact</div>

<input type="range" id="slider" min="0" max="100" value="0">

<div class="stats">

<div class="stat">
<div id="hipVal" class="stat-val">0°</div>
Hip
</div>

<div class="stat">
<div id="kneeVal" class="stat-val">0°</div>
Knee
</div>

<div class="stat">
<div id="ankleVal" class="stat-val">0°</div>
Ankle
</div>

</div>

</div>

<script>

/* ------------------------------
GAIT DATA
--------------------------------*/

let gaitData=[
{h:25,k:-3,a:-2,name:"Initial Contact"},
{h:20,k:-15,a:-1,name:"Loading"},
{h:5,k:-8,a:5,name:"Mid Stance"},
{h:-10,k:-2,a:10,name:"Terminal Stance"},
{h:-15,k:-8,a:8,name:"Pre Swing"},
{h:5,k:-55,a:-10,name:"Initial Swing"},
{h:22,k:-45,a:0,name:"Mid Swing"},
{h:25,k:-3,a:0,name:"Terminal Swing"}
]

function interpolate(p){

let idx=(p/100)*(gaitData.length-1)

let i=Math.floor(idx)

let t=idx-i

let next=gaitData[i+1]||gaitData[0]

function lerp(a,b){return a+(b-a)*t}

return{
h:lerp(gaitData[i].h,next.h),
k:lerp(gaitData[i].k,next.k),
a:lerp(gaitData[i].a,next.a),
name:gaitData[i].name
}

}

/* ------------------------------
THREEJS SCENE
--------------------------------*/

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100)

camera.position.set(1.5,1.2,2.5)

let renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("canvas").appendChild(renderer.domElement)

let controls=new THREE.OrbitControls(camera,renderer.domElement)

controls.target.set(0,0.8,0)

controls.update()

/* lights */

let hemi=new THREE.HemisphereLight(0xffffff,0x444444,0.8)

scene.add(hemi)

let dir=new THREE.DirectionalLight(0xffffff,0.8)

dir.position.set(3,5,3)

scene.add(dir)

/* floor */

let grid=new THREE.GridHelper(10,20)

scene.add(grid)

let plane=new THREE.Mesh(

new THREE.PlaneGeometry(10,10),

new THREE.MeshPhongMaterial({color:0x333333})

)

plane.rotation.x=-Math.PI/2

scene.add(plane)

/* ------------------------------
SKELETON
--------------------------------*/

let matR=new THREE.MeshPhongMaterial({color:0x0fbcf9})

let matL=new THREE.MeshPhongMaterial({color:0xaaaaaa})

let jointMat=new THREE.MeshPhongMaterial({color:0xffff00})

function bone(len,mat){

let group=new THREE.Group()

let joint=new THREE.Mesh(

new THREE.SphereGeometry(0.05),

jointMat)

group.add(joint)

let mesh=new THREE.Mesh(

new THREE.CylinderGeometry(0.04,0.03,len,12),

mat)

mesh.position.y=-len/2

group.add(mesh)

return group

}

function foot(mat){

let group=new THREE.Group()

let mesh=new THREE.Mesh(

new THREE.BoxGeometry(0.08,0.04,0.18),

mat)

mesh.position.set(0,-0.02,0.09)

group.add(mesh)

return group

}

let pelvis=new THREE.Group()

pelvis.position.y=0.95

scene.add(pelvis)

let femur=0.4

let tibia=0.43

/* right */

let rHip=bone(femur,matR)

rHip.position.x=0.12

pelvis.add(rHip)

let rKnee=bone(tibia,matR)

rKnee.position.y=-femur

rHip.add(rKnee)

let rFoot=foot(matR)

rFoot.position.y=-tibia

rKnee.add(rFoot)

/* left */

let lHip=bone(femur,matL)

lHip.position.x=-0.12

pelvis.add(lHip)

let lKnee=bone(tibia,matL)

lKnee.position.y=-femur

lHip.add(lKnee)

let lFoot=foot(matL)

lFoot.position.y=-tibia

lKnee.add(lFoot)

/* ------------------------------
UI
--------------------------------*/

let slider=document.getElementById("slider")

let hipVal=document.getElementById("hipVal")
let kneeVal=document.getElementById("kneeVal")
let ankleVal=document.getElementById("ankleVal")

let phase=document.getElementById("phase")

/* ------------------------------
POSE UPDATE
--------------------------------*/

function updatePose(){

let p=parseFloat(slider.value)

let r=interpolate(p)

let l=interpolate((p+50)%100)

let rad=Math.PI/180

rHip.rotation.x=r.h*rad
rKnee.rotation.x=r.k*rad
rFoot.rotation.x=r.a*rad

lHip.rotation.x=l.h*rad
lKnee.rotation.x=l.k*rad
lFoot.rotation.x=l.a*rad

hipVal.innerText=Math.round(r.h)+"°"
kneeVal.innerText=Math.round(r.k)+"°"
ankleVal.innerText=Math.round(r.a)+"°"

phase.innerText=r.name

updateChart(r)

}

/* ------------------------------
AUTOPLAY
--------------------------------*/

let auto=true
let percent=0

function animate(){

requestAnimationFrame(animate)

if(auto){

percent+=0.2

if(percent>100)percent=0

slider.value=percent

updatePose()

}

controls.update()

renderer.render(scene,camera)

}

animate()

slider.addEventListener("input",updatePose)

/* ------------------------------
CHART
--------------------------------*/

let ctx=document.getElementById("chart").getContext("2d")

let chart=new Chart(ctx,{

type:"line",

data:{
labels:[],
datasets:[
{label:"Hip",data:[]},
{label:"Knee",data:[]},
{label:"Ankle",data:[]}
]
},

options:{
animation:false,
scales:{
y:{min:-60,max:60}
}
}

})

function updateChart(r){

if(chart.data.labels.length>50){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()
chart.data.datasets[1].data.shift()
chart.data.datasets[2].data.shift()

}

chart.data.labels.push("")

chart.data.datasets[0].data.push(r.h)
chart.data.datasets[1].data.push(r.k)
chart.data.datasets[2].data.push(r.a)

chart.update()

}

/* ------------------------------
.MOT FILE LOADING
--------------------------------*/

document.getElementById("fileUpload").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let lines=reader.result.split("\n")

let data=[]

for(let i=10;i<lines.length;i++){

let cols=lines[i].trim().split(/\s+/)

if(cols.length>3){

data.push({

h:parseFloat(cols[1]),
k:parseFloat(cols[2]),
a:parseFloat(cols[3]),
name:"Imported"

})

}

}

if(data.length>0){

gaitData=data

}

}

reader.readAsText(file)

})

/* ------------------------------
RESIZE
--------------------------------*/

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
